<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img id="img1" src="Auto Fill Engine - Logo.png" alt="image">
    <button onclick="changeimg()">Change to New Image</button>
    <button onclick="changeimg1()">Change to Old Image</button>
    <script>
        function changeimg(){
            document.getElementById("img1").src="Doc.jpg"
        }
        function changeimg1(){
            document.getElementById("img1").src="Auto Fill Engine - Logo.png"
        }
    </script>
</body>
</html>
