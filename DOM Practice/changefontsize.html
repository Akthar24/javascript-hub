<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id ="text" >Hello</p>
    <button onclick="makeSmall()">Small</button>
    <button onclick="makeLarge()">Large</button>
    <script>
    function makeSmall(){
        document.getElementById("text").style.fontsize="14px";
    }
    function makeLarge(){
        document.getElementById("text").style.fontsize="28px";
    }
    </script>
</body>
</html>
